---
- name: Pre tasks
  hosts: all
  tags: always
  gather_facts: false
  pre_tasks:
    - name: Check if host is Arch Linux
      ansible.builtin.raw: test -f /etc/arch-release || grep -qi '^ID=arch' /etc/os-release 2>/dev/null
      register: is_arch
      failed_when: false
      changed_when: false
      check_mode: false

    - name: Install Python on Arch Linux (bootstrap)
      ansible.builtin.raw: pacman -Sy --noconfirm python
      when: is_arch.rc == 0
      become: true
      register: python_install
      changed_when: false

    - name: Gather facts
      ansible.builtin.setup:

    - name: Runtime check
      ansible.builtin.import_tasks: pre_tasks/runtime_check.yml
      tags:
        - always

    - name: Update apt cache explicitly (for Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
      become: true
      when: ansible_facts["os_family"] == "Debian"

    - name: Update dnf cache explicitly (for RHEL/CentOS/Fedora)
      ansible.builtin.dnf:
        update_cache: true
      become: true
      when: ansible_facts["os_family"] == "RedHat"

    - name: Update pacman cache explicitly (Arch Linux)
      community.general.pacman:
        update_cache: true
      become: true
      when: ansible_facts["os_family"] == "Archlinux"

    - name: Runner CI SSH keypair bootstrap
      when: inventory_hostname == 'runner'
      become: true
      block:
        - name: runner | ssh | ensure /root/.ssh exists
          ansible.builtin.file:
            path: /root/.ssh
            state: directory
            mode: "0700"

        - name: runner | ssh | ensure CI keypair exists
          community.crypto.openssh_keypair:
            path: /root/.ssh/id_ed25519
            type: ed25519
          register: runner_ssh_keypair

        - name: runner | ssh | expose runner public key to later plays
          ansible.builtin.set_fact:
            runner_ssh_public_key: "{{ runner_ssh_keypair.public_key }}"
            cacheable: true

# Must patch proxmox instance before running base tasks on them.
# Otherwise it will fail dues to missing enterprise repo.
- name: Run server tasks
  hosts: server, nodes
  tags: server, nodes
  become: true
  roles:
    - server

- name: Run base tasks
  hosts: all
  tags: base
  become: true
  roles:
    - base

- name: Run workstation tasks
  hosts: workstation
  tags: workstation
  become: true
  roles:
    - workstation

- name: Run runner tasks
  hosts: runner
  tags: runner
  become: true
  roles:
    - runner

- name: Run Kubernetes common tasks
  hosts: kubernetes_control, kubernetes_workers
  tags: kubernetes, kubernetes-common
  become: true
  roles:
    - kubernetes_common

- name: Run Kubernetes control plane tasks
  hosts: kubernetes_control
  tags: kubernetes, kubernetes-control
  become: true
  roles:
    - kubernetes_control

- name: Run Kubernetes worker tasks
  hosts: kubernetes_workers
  tags: kubernetes, kubernetes-worker
  become: true
  roles:
    - kubernetes_worker

- name: Run node exporter role
  hosts: server
  tags: node-exporter
  become: true
  roles:
    - role: prometheus.prometheus.node_exporter
      when: node_exporter is defined and node_exporter

- name: end of run cleanup
  hosts: all
  become: true
  tasks:
    - name: cleanup package cache (debian and ubuntu)
      tags: always
      ansible.builtin.apt:
        autoclean: true
      when: ansible_facts['distribution'] in ['Ubuntu', 'Debian', 'LMDE']

    - name: autoremove orphan packages (debian and ubuntu)
      tags: always
      ansible.builtin.apt:
        autoremove: true
        purge: true
      when: ansible_facts['distribution'] in ['Ubuntu', 'Debian', 'LMDE']
