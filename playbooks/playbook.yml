---
- name: Pre tasks
  hosts: all
  tags: always
  gather_facts: false
  pre_tasks:
    - name: Check if host is Arch Linux
      ansible.builtin.raw: test -f /etc/arch-release || grep -qi '^ID=arch' /etc/os-release 2>/dev/null
      register: is_arch
      failed_when: false
      changed_when: false
      check_mode: false

    - name: Install Python on Arch Linux (bootstrap)
      ansible.builtin.raw: pacman -Sy --noconfirm python
      when: is_arch.rc == 0
      become: true
      register: python_install
      changed_when: false

    - name: Gather facts
      ansible.builtin.setup:

    - name: Runtime check
      ansible.builtin.import_tasks: pre_tasks/runtime_check.yml
      tags:
        - always

    - name: Update apt cache explicitly (for Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
      become: true
      when: ansible_facts["os_family"] == "Debian"

    - name: Update dnf cache explicitly (for RHEL/CentOS/Fedora)
      ansible.builtin.dnf:
        update_cache: true
      become: true
      when: ansible_facts["os_family"] == "RedHat"

    - name: Update pacman cache explicitly (Arch Linux)
      community.general.pacman:
        update_cache: true
      become: true
      when: ansible_facts["os_family"] == "Archlinux"

    - name: Runner CI SSH keypair bootstrap
      when: inventory_hostname == 'runner'
      become: true
      block:
        # CI jobs run as the gitlab-runner shell-executor user (not root), so
        # the keypair used to reach other hosts must live in its home, not
        # root's. This must exist before the runner role's package install
        # normally creates it, since base tasks (which authorize this key on
        # every other host) run before the runner role in this playbook.
        - name: runner | ssh | ensure gitlab-runner system user exists
          ansible.builtin.user:
            name: gitlab-runner
            system: true
            shell: /bin/bash
            home: /home/gitlab-runner
            create_home: true
            state: present

        - name: runner | ssh | ensure gitlab-runner's .ssh directory exists
          ansible.builtin.file:
            path: /home/gitlab-runner/.ssh
            state: directory
            owner: gitlab-runner
            group: gitlab-runner
            mode: "0700"

        - name: runner | ssh | ensure CI keypair exists for gitlab-runner
          community.crypto.openssh_keypair:
            path: /home/gitlab-runner/.ssh/id_ed25519
            type: ed25519
            owner: gitlab-runner
            group: gitlab-runner
            mode: "0600"
          register: gitlab_runner_ssh_keypair

        - name: runner | ssh | expose gitlab-runner's public key to later plays
          ansible.builtin.set_fact:
            gitlab_runner_ssh_public_key: "{{ gitlab_runner_ssh_keypair.public_key }}"
            cacheable: true

        # With strict host key checking (the default, left in place for
        # interactive/manual runs) gitlab-runner would otherwise refuse to
        # connect to any host it hasn't seen before, regardless of whether its
        # key is authorized there. Scan from the runner host itself so this
        # works no matter where ansible-playbook is invoked from.
        - name: runner | ssh | determine managed hosts to trust
          ansible.builtin.set_fact:
            gitlab_runner_known_hosts_targets: >-
              {{ (groups['server'] + groups['nodes'] + groups['kubernetes'])
                 | map('extract', hostvars, 'ansible_host') | unique | list }}

        - name: runner | ssh | scan managed hosts' SSH keys
          ansible.builtin.command:
            argv:
              - ssh-keyscan
              - -T
              - "5"
              - "{{ item }}"
          loop: "{{ gitlab_runner_known_hosts_targets }}"
          register: gitlab_runner_keyscan
          changed_when: false
          failed_when: false

        - name: runner | ssh | trust scanned host keys for gitlab-runner
          ansible.builtin.known_hosts:
            path: /home/gitlab-runner/.ssh/known_hosts
            name: "{{ item.item }}"
            key: "{{ item.stdout }}"
            state: present
          become: true
          become_user: gitlab-runner
          loop: "{{ gitlab_runner_keyscan.results }}"
          loop_control:
            label: "{{ item.item }}"
          when: item.stdout | length > 0

# Must patch proxmox instance before running base tasks on them.
# Otherwise it will fail dues to missing enterprise repo.
- name: Run server tasks
  hosts: server, nodes
  tags: server, nodes
  become: true
  roles:
    - server

- name: Run base tasks
  hosts: all
  tags: base
  become: true
  roles:
    - base

- name: Run workstation tasks
  hosts: workstation
  tags: workstation
  become: true
  roles:
    - workstation

- name: Run runner tasks
  hosts: runner
  tags: runner
  become: true
  roles:
    - runner

- name: Run Kubernetes common tasks
  hosts: kubernetes_control, kubernetes_workers
  tags: kubernetes, kubernetes-common
  become: true
  roles:
    - kubernetes_common

- name: Run Kubernetes control plane tasks
  hosts: kubernetes_control
  tags: kubernetes, kubernetes-control
  become: true
  roles:
    - kubernetes_control

- name: Run Kubernetes worker tasks
  hosts: kubernetes_workers
  tags: kubernetes, kubernetes-worker
  become: true
  roles:
    - kubernetes_worker

- name: Run node exporter role
  hosts: server
  tags: node-exporter
  become: true
  roles:
    - role: prometheus.prometheus.node_exporter
      when: node_exporter is defined and node_exporter

# Re-renders the monitoring hub so gatus/homepage/homelable/whats-up-docker and
# the prometheus scrape targets pick up services declared in the host_vars
# `services` registries. Tagged `always` so no extra --tags is ever needed:
# any run whose --limit includes docker (and prometheus-grafana) converges the
# hub automatically. The node tasks set monitoring_hub_synced /
# prometheus_stack_synced when the server play already ran them, so a full run
# does not deploy the hub twice. Ansible cannot reach hosts outside --limit,
# so when the hub is excluded the follow-up play below warns instead.
# `--skip-tags monitoring-sync` opts out of the sync explicitly.
- name: Sync monitoring hub with deployed services
  hosts: docker, prometheus-grafana
  tags: [always, monitoring-sync]
  become: true
  tasks:
    # Captured up front: nodes/docker.yml itself sets monitoring_hub_synced,
    # which must not stop the canvas push right after it.
    - name: Determine what this run already refreshed
      ansible.builtin.set_fact:
        hub_needs_sync: "{{ monitoring_hub_synced is not defined }}"
        prom_needs_sync: "{{ prometheus_stack_synced is not defined }}"

    - name: Refresh the docker node stack (gatus, homepage, whats-up-docker)
      ansible.builtin.include_role:
        name: server
        tasks_from: nodes/docker.yml
      when:
        - ansible_facts['hostname'] == "docker"
        - hub_needs_sync

    - name: Push the homelable canvas
      ansible.builtin.include_role:
        name: server
        tasks_from: nodes/homelable_canvas.yml
      when:
        - ansible_facts['hostname'] == "docker"
        - hub_needs_sync

    - name: Refresh the prometheus-grafana stack (scrape targets)
      ansible.builtin.include_role:
        name: server
        tasks_from: nodes/prometheus-grafana.yml
      when:
        - ansible_facts['hostname'] == "prometheus-grafana"
        - prom_needs_sync

- name: Warn when the monitoring hub was outside this run
  hosts: server, nodes
  gather_facts: false
  tags: always
  tasks:
    # Playbook runs with the default linear strategy, so run_once here is safe.
    - name: Warn that gatus/homepage/homelable/whats-up-docker were not re-rendered  # noqa: run-once[task]
      ansible.builtin.debug:
        msg: >-
          WARNING: the docker host was not part of this run, so gatus, homepage,
          the homelable canvas and whats-up-docker were NOT re-rendered. If this
          run changed any service, re-run with the hub included, e.g.
          --limit <node>,docker
      run_once: true
      when: hostvars['docker'].monitoring_hub_synced is not defined

    # Playbook runs with the default linear strategy, so run_once here is safe.
    - name: Note that prometheus scrape targets were not re-rendered  # noqa: run-once[task]
      ansible.builtin.debug:
        msg: >-
          NOTE: prometheus-grafana was not part of this run, so prometheus
          scrape targets were not re-rendered. This only matters when a host
          gained or lost `node_exporter: true` — if so, re-run with
          --limit prometheus-grafana included.
      run_once: true
      when: hostvars['prometheus-grafana'].prometheus_stack_synced is not defined

- name: end of run cleanup
  hosts: all
  become: true
  tasks:
    - name: cleanup package cache (debian and ubuntu)
      tags: always
      ansible.builtin.apt:
        autoclean: true
      when: ansible_facts['distribution'] in ['Ubuntu', 'Debian']

    - name: autoremove orphan packages (debian and ubuntu)
      tags: always
      ansible.builtin.apt:
        autoremove: true
        purge: true
      when: ansible_facts['distribution'] in ['Ubuntu', 'Debian']
