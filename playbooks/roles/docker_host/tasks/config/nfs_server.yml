---
- name: docker_host | nfs-server | Create directories for disk mounts
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ storage_disks.values() | list }}"

- name: docker_host | nfs-server | Update fstab with disks
  ansible.builtin.blockinfile:
    path: /etc/fstab
    block: |
      # DISK SECTION
      {% for disk in storage_disks.values() %}
      #LABEL="{{ disk.label }}"
      UUID="{{ disk.uuid }}" {{ disk.path }} ext4 errors=remount-ro 0 1
      {% endfor %}
  notify:
    - reload systemd daemon
    - mount nfs filesystems

- name: docker_host | nfs-server | install nfs
  ansible.builtin.apt:
    name: nfs-kernel-server

- name: docker_host | nfs-server | Add NFS exports
  ansible.builtin.blockinfile:
    path: /etc/exports
    block: |
      {% for client in nfs_server_export_clients %}
      {% for path in nfs_server_export_paths %}
      {{ path }} {{ client }}({{ nfs_server_export_options }})
      {% endfor %}

      {% endfor %}
  notify: reexport nfs shares

- name: docker_host | nfs-server | Flush handlers so disk mounts are active
  ansible.builtin.meta: flush_handlers

- name: docker_host | nfs-server | Create group for gitlab-runner box storage access
  ansible.builtin.group:
    name: "{{ gitlab_runner_storage_group }}"
    gid: "{{ gitlab_runner_storage_gid }}"
    state: present

- name: docker_host | nfs-server | Create gitlab-runner box storage directory
  ansible.builtin.file:
    path: "{{ gitlab_runner_box_storage_dir }}"
    state: directory
    owner: root
    group: "{{ gitlab_runner_storage_group }}"
    mode: '2775'
