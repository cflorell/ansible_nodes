---
# Ansible version of script in server/files/nfs/server_node_setup.sh
- name: docker_host | nfs-client | Setup nfs mount on server node
  block:
    - name: docker_host | nfs-client | Install necessary packages
      ansible.builtin.apt:
        name:
          - libfuse-dev
          - autoconf
          - make
          - g++
          - nfs-common
          - fuse
          - mergerfs
        state: present
        update_cache: true

    - name: docker_host | nfs-client | Download and extract unrarsrc
      ansible.builtin.unarchive:
        src: ftp://ftp.rarlab.com/rar/unrarsrc-6.2.6.tar.gz
        dest: /usr/local/bin
        remote_src: true
      retries: 3
      delay: 3
      register: result
      until: result is succeeded

    - name: docker_host | nfs-client | Compile unrar
      ansible.builtin.command: make lib -f makefile
      args:
        chdir: /usr/local/bin/unrar/
      register: output
      changed_when: output.rc != 0

    - name: docker_host | nfs-client | Download and extract rar2fs
      ansible.builtin.unarchive:
        src: https://github.com/hasse69/rar2fs/releases/download/v1.29.6/rar2fs-1.29.6.tar.gz
        dest: /usr/local/bin
        remote_src: true
      retries: 3
      delay: 3
      register: result
      until: result is succeeded

    - name: docker_host | nfs-client | Configure and compile rar2fs
      block:
        - name: docker_host | nfs-client | Run autoreconf
          ansible.builtin.command: autoreconf -f -i
          args:
            chdir: /usr/local/bin/rar2fs-1.29.6/
          register: output
          changed_when: output.rc != 0

        - name: docker_host | nfs-client | Configure rar2fs
          ansible.builtin.command: ./configure --with-unrar=../unrar
          args:
            chdir: /usr/local/bin/rar2fs-1.29.6/
          register: output
          changed_when: output.rc != 0

        - name: docker_host | nfs-client | Compile rar2fs
          become: true
          ansible.builtin.command: make
          args:
            chdir: /usr/local/bin/rar2fs-1.29.6/
          register: output
          changed_when: output.rc != 0

        - name: docker_host | nfs-client | Install rar2fs
          become: true
          ansible.builtin.command: make install
          args:
            chdir: /usr/local/bin/rar2fs-1.29.6/
          register: output
          changed_when: output.rc != 0


    - name: docker_host | nfs-client | Create directories for regular NFS mounts
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /mnt/Storage1
        - /mnt/Storage2
        - /mnt/Storage3
        - /mnt/Storage4

    - name: docker_host | nfs-client | Create directories for rar NFS mounts
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0555'
      loop:
        - /mnt/Storage4Rar
        - /mnt/Storage3Rar
        - /mnt/Storage2Rar
        - /mnt/Storage1Rar

    - name: docker_host | nfs-client | Add NFS mounts to /etc/fstab
      ansible.builtin.blockinfile:
        path: /etc/fstab
        block: |
          {% for mount in nfs_client_mounts %}
          {{ mount.source }} {{ mount.path }} {{ mount.fstype }} {{ mount.options }} 0 0
          {% endfor %}

          {% for mount in nfs_client_fuse_mounts %}
          {{ mount.source }} {{ mount.path }} {{ mount.fstype }} {{ mount.options }} 0 0
          {% endfor %}
      notify:
        - reload systemd daemon
        - mount nfs filesystems

    - name: docker_host | nfs-client | Check which mergerfs mounts are already active
      ansible.builtin.command: "mountpoint -q /mnt/merged/Storage{{ item }}"
      register: mergerfs_mountpoint_check
      failed_when: false
      changed_when: false
      loop: ["1", "2", "3", "4"]

    # /mnt/merged/StorageN only ever holds an empty stub dir tree left behind
    # by Docker auto-creating bind-mount sources before the merge existed
    # (see docker_host/templates/media/docker-compose.yml.j2) — safe to wipe.
    # FUSE refuses to mount onto a non-empty dir, which is what breaks
    # `mount -a` here; skip any mountpoint that's already live so we don't
    # touch it while mounted.
    - name: docker_host | nfs-client | Remove stub content from unmounted mergerfs mountpoints
      ansible.builtin.file:
        path: "/mnt/merged/Storage{{ item.item }}"
        state: absent
      loop: "{{ mergerfs_mountpoint_check.results }}"
      when: item.rc != 0

    - name: docker_host | nfs-client | Create directories for mergerfs mounts
      ansible.builtin.file:
        path: "/mnt/merged/Storage{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop: ["1", "2", "3", "4"]

    - name: docker_host | nfs-client | Add mergerfs mounts to /etc/fstab
      ansible.builtin.blockinfile:
        path: /etc/fstab
        marker: "# {mark} MERGERFS MOUNTS"
        block: |
          {% for n in ['1', '2', '3', '4'] %}
          {% set branches = '/mnt/Storage' ~ n ~ ':/mnt/Storage' ~ n ~ 'Rar=RO' %}
          {% set requires = 'x-systemd.requires=mnt-Storage' ~ n ~ '.mount,x-systemd.requires=mnt-Storage' ~ n ~ 'Rar.mount' %}
          {% set opts = 'allow_other,nonempty,category.create=ff,dropcacheonclose=true,use_ino,_netdev,nofail,' ~ requires %}
          {{ branches }} /mnt/merged/Storage{{ n }} fuse.mergerfs {{ opts }} 0 0
          {% endfor %}
      notify:
        - reload systemd daemon
        - mount nfs filesystems
