---
- name: docker_host | node-torrent | Create service directories
  ansible.builtin.file:
    path: "/{{ ansible_facts['user_id'] }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - promtail
    - qbittorrent-config
    - qbittorrent-data
    - torrent-natpmp-keeper

- name: docker_host | node-torrent | Move promtail-config.yml
  ansible.builtin.template:
    src: common/promtail-config.yml.j2
    dest: "/{{ ansible_facts['user_id'] }}/promtail/promtail-config.yml"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0600"

- name: docker_host | node-torrent | move docker-compose.yml file to host
  ansible.builtin.template:
    src: "torrent/docker-compose.yml.j2"
    dest: "/{{ ansible_facts['user_id'] }}/docker-compose.yml"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0600"

- name: docker_host | node-torrent | move torrent-natpmp-keeper.env file to host
  ansible.builtin.template:
    src: "torrent/torrent-natpmp-keeper.env.j2"
    dest: "/{{ ansible_facts['user_id'] }}/torrent-natpmp-keeper.env"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0600"

- name: docker_host | node-torrent | move se.protonvpn.udp.ovpn file to qbittorrent-config
  ansible.builtin.copy:
    src: "torrent/se.protonvpn.udp.ovpn"
    dest: "/{{ ansible_facts['user_id'] }}/qbittorrent-config/openvpn/se.protonvpn.udp.ovpn"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0600"

- name: docker_host | node-torrent | move torrent-natpmp-keeper files
  ansible.builtin.copy:
    src: "torrent/torrent-natpmp-keeper/"
    dest: "/{{ ansible_facts['user_id'] }}/torrent-natpmp-keeper/"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0600"

- name: docker_host | node-torrent | deploy Docker Compose stack
  community.docker.docker_compose_v2:
    project_src: "/{{ ansible_facts['user_id'] }}/"
    remove_orphans: true
    files:
      - docker-compose.yml
