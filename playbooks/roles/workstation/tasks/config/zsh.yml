---
- name: "config | ZSH | Detect oh-my-zsh"
  ansible.builtin.stat:
    path: "/home/christoffer/.oh-my-zsh"
  register: ohmyzsh

- name: "config | ZSH | Register oh-my-zsh state"
  ansible.builtin.set_fact:
    ohmyzsh_is_installed: "{{ ohmyzsh.stat.exists }}"

- name: "config | ZSH | Debug ohmyzsh_is_installed"
  ansible.builtin.debug:
    var: ohmyzsh_is_installed

- name: software | utilities | install zsh
  ansible.builtin.package:
    name: zsh

- name: "config | ZSH | Install oh-my-zsh"
  when: not ohmyzsh_is_installed
  block:
    - name: "config | ZSH | Download oh-my-zsh Install Script"
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
        dest: /tmp/oh-my-zsh_install.sh
        force: true
        mode: "0755"
      notify:
        - "ZSH | Cleanup oh-my-zsh install script"

    - name: "config | ZSH | Run the install script"
      become: true
      become_user: christoffer
      ansible.builtin.command:
        cmd: /tmp/oh-my-zsh_install.sh --unattended
      register: output
      changed_when: output.rc != 0

- name: "config | ZSH | Install Custom Plugins"
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "/home/christoffer/.oh-my-zsh/custom/plugins/{{ item.name }}"
    update: true
    depth: 1
  loop:
    - repo: https://github.com/zsh-users/zsh-autosuggestions
      name: zsh-autosuggestions
    - repo: https://github.com/joshskidmore/zsh-fzf-history-search
      name: zsh-fzf-history-search
  notify: update_zsh_plugin_perms

- name: "config | ZSH | Copy .zshrc"
  ansible.builtin.copy:
    src: "files/users/christoffer/zsh/.zshrc"
    dest: "/home/christoffer/.zshrc"
    owner: christoffer
    group: christoffer
    mode: "0644"

- name: "config | ZSH | Copy custom zsh config"
  ansible.builtin.copy:
    src: "files/users/christoffer/zsh/config/"
    dest: "/home/christoffer/.config/zsh/"
    owner: christoffer
    group: christoffer
    mode: "0644"
    directory_mode: "0755"
    force: true
