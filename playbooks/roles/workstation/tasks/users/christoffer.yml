---
- name: users | christoffer | create group
  ansible.builtin.group:
    name: christoffer
    state: present

- name: users | christoffer | create user Debian/Ubuntu
  ansible.builtin.user:
    name: christoffer
    group: christoffer
    groups: adm,sudo
    state: present
    comment: christoffer
    password: '{{ christoffer_password }}'
    shell: /bin/bash
  no_log: true
  when: ansible_facts['distribution'] in ['Ubuntu', 'Debian', 'LMDE']

- name: users | christoffer | create user Fedora
  ansible.builtin.user:
    name: christoffer
    group: christoffer
    groups: adm,wheel
    state: present
    comment: christoffer
    password: '{{ christoffer_password }}'
    shell: /bin/bash
  no_log: true
  when: ansible_facts['distribution'] == "Fedora"

- name: users | christoffer | create user ArchLinux
  ansible.builtin.user:
    name: christoffer
    group: christoffer
    groups: wheel
    state: present
    comment: christoffer
    password: '{{ christoffer_password }}'
    shell: /bin/bash
  no_log: true
  when: ansible_facts['distribution'] == "Archlinux"

- name: users | christoffer | add sudoers file
  ansible.builtin.copy:
    src: files/users/sudoers_christoffer
    dest: /etc/sudoers.d/christoffer
    owner: root
    group: root
    mode: "0440"

- name: users | christoffer | create .ssh directory
  ansible.builtin.file:
    path: /home/christoffer/.ssh
    state: directory
    owner: christoffer
    group: christoffer
    mode: "0700"

- name: users | christoffer | check for persisted ssh keypair in private secrets
  ansible.builtin.stat:
    path: "{{ homelab_secrets_dir }}/ssh/{{ inventory_hostname }}/id_ed25519"
  delegate_to: localhost
  become: false
  register: persisted_ssh_key

- name: users | christoffer | deploy persisted ssh keypair
  ansible.builtin.copy:
    src: "{{ homelab_secrets_dir }}/ssh/{{ inventory_hostname }}/{{ item.file }}"
    dest: "/home/christoffer/.ssh/{{ item.file }}"
    owner: christoffer
    group: christoffer
    mode: "{{ item.mode }}"
  loop:
    - {file: id_ed25519, mode: "0600"}
    - {file: id_ed25519.pub, mode: "0644"}
  when: persisted_ssh_key.stat.exists

- name: users | christoffer | create ssh keypair
  community.crypto.openssh_keypair:
    path: /home/christoffer/.ssh/id_ed25519
    type: ed25519
    owner: christoffer
    group: christoffer
  when: not persisted_ssh_key.stat.exists

- name: users | christoffer | persist ssh keypair to private secrets
  when: not persisted_ssh_key.stat.exists
  block:
    - name: users | christoffer | create ssh secrets directory
      ansible.builtin.file:
        path: "{{ homelab_secrets_dir }}/ssh/{{ inventory_hostname }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: users | christoffer | fetch ssh keypair for persistence
      ansible.builtin.fetch:
        src: "/home/christoffer/.ssh/{{ item }}"
        dest: "{{ homelab_secrets_dir }}/ssh/{{ inventory_hostname }}/{{ item }}"
        flat: true
      loop:
        - id_ed25519
        - id_ed25519.pub

    - name: users | christoffer | set persisted ssh key permissions
      ansible.builtin.file:
        path: "{{ homelab_secrets_dir }}/ssh/{{ inventory_hostname }}/{{ item.file }}"
        mode: "{{ item.mode }}"
      delegate_to: localhost
      become: false
      loop:
        - {file: id_ed25519, mode: "0600"}
        - {file: id_ed25519.pub, mode: "0644"}

- name: users | christoffer | create config directories
  ansible.builtin.file:
    path: /home/christoffer/{{ item.dir }}
    state: directory
    owner: christoffer
    group: christoffer
    mode: "0700"
  with_items:
    - {dir: .config}
    - {dir: .config/htop}
    - {dir: .tmux}
    - {dir: .tmux/config}
    - {dir: .tmux/plugins}

- name: users | christoffer | copy tmux config
  ansible.builtin.copy:
    src: files/users/christoffer/tmux/tmux.conf
    dest: /home/christoffer/.tmux.conf
    owner: christoffer
    group: christoffer
    mode: "0600"

- name: users | christoffer | copy dotfiles
  ansible.builtin.copy:
    src: files/users/christoffer/{{ item.src }}
    dest: /home/christoffer/{{ item.dest }}
    owner: christoffer
    group: christoffer
    mode: "0600"
  with_items:
    - {src: htop/htoprc, dest: .config/htop/htoprc}

- name: Prevent git error on runner
  community.general.git_config:
    name: safe.directory
    scope: global
    value: "*"

- name: users | christoffer | clone tmux-completion plugin repository
  ansible.builtin.git:
    repo: https://github.com/srsudar/tmux-completion.git
    dest: /home/christoffer/.tmux/plugins/completion
    force: true
  notify: update_tmux_plugin_perms
  retries: 3
  delay: 3
  register: result
  until: result is succeeded

- name: users | christoffer | clone tmux-continuum plugin repository
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tmux-continuum.git
    dest: /home/christoffer/.tmux/plugins/continuum
    force: true
  notify: update_tmux_plugin_perms
  retries: 3
  delay: 3
  register: result
  until: result is succeeded

- name: users | christoffer | clone tmux-resurrect plugin repository
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tmux-resurrect.git
    dest: /home/christoffer/.tmux/plugins/resurrect
    force: true
  notify: update_tmux_plugin_perms
  retries: 3
  delay: 3
  register: result
  until: result is succeeded

- name: users | christoffer | remove preinstalled clutter from home directory
  ansible.builtin.file:
    path: /home/christoffer/{{ item }}
    state: absent
  with_items: [examples.desktop, Music, Public, Templates, Videos]

- name: users | christoffer | create personal config directories
  ansible.builtin.file:
    path: /home/christoffer/{{ item.dir }}
    state: directory
    owner: christoffer
    group: christoffer
    mode: "0700"
  with_items:
    - {dir: .config}
    - {dir: .config/autostart}
    - {dir: .config/bpytop}
    - {dir: .config/gtk-3.0}
    - {dir: .config/terminator}
    - {dir: .local}
    - {dir: .local/share}
    - {dir: .local/share/applications}
    - {dir: bin}

- name: users | christoffer | copy personal config files
  ansible.builtin.copy:
    src: files/users/christoffer/{{ item.src }}
    dest: /home/christoffer/{{ item.dest }}
    owner: christoffer
    group: christoffer
    mode: "0600"
  with_items:
    - {src: terminator_config, dest: .config/terminator/config}

- name: users | christoffer | template ssh client config
  ansible.builtin.template:
    src: christoffer/ssh_config.j2
    dest: /home/christoffer/.ssh/config
    owner: christoffer
    group: christoffer
    mode: "0600"
