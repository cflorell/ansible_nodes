---
- name: kubernetes control | check cluster init state
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubernetes_admin_conf

- name: kubernetes control | initialize control plane
  ansible.builtin.command:
    argv: >-
      {{
        ['kubeadm', 'init',
         '--pod-network-cidr', kubernetes_pod_network_cidr,
         '--node-name', inventory_hostname,
         '--cri-socket', kubernetes_cri_socket]
        + kubernetes_kubeadm_init_extra_args
      }}
  when: not kubernetes_admin_conf.stat.exists
  register: output
  changed_when: output.rc != 0

- name: kubernetes control | create kubeconfig directory
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: kubernetes control | copy kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    owner: root
    group: root
    mode: "0600"

- name: kubernetes control | wait for API server
  ansible.builtin.command:
    argv:
      - kubectl
      - get
      - nodes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: kubernetes_control_nodes
  changed_when: false
  retries: 20
  delay: 6
  until: kubernetes_control_nodes.rc == 0

- name: kubernetes control | install pod network
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - "{{ kubernetes_cni_manifest_url }}"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: kubernetes_cni_apply
  changed_when: >
    'created' in kubernetes_cni_apply.stdout or
    'configured' in kubernetes_cni_apply.stdout

- name: kubernetes control | fetch metrics-server manifest
  ansible.builtin.uri:
    url: "{{ kubernetes_metrics_server_manifest_url }}"
    return_content: true
  register: kubernetes_metrics_server_manifest
  retries: 3
  delay: 3
  until: kubernetes_metrics_server_manifest is succeeded
  # ansible.builtin.uri declares no check_mode support, so --check skips it
  # unconditionally by default, leaving the manifest content unavailable for
  # the write task below. This is a read-only GET with nothing to dry-run.
  check_mode: false

- name: kubernetes control | write metrics-server manifest
  ansible.builtin.copy:
    dest: /etc/kubernetes/metrics-server.yml
    owner: root
    group: root
    mode: "0644"
    # kubeadm clusters use self-signed kubelet certs that metrics-server
    # doesn't trust by default (unlike managed cloud Kubernetes), so it fails
    # every scrape with "x509: certificate signed by unknown authority"
    # unless told to skip verification.
    content: |
      {{ kubernetes_metrics_server_manifest.content
         | regex_replace('- --metric-resolution=15s', '- --metric-resolution=15s\n        - --kubelet-insecure-tls') }}

- name: kubernetes control | install metrics-server
  ansible.builtin.command:
    argv:
      - kubectl
      - apply
      - -f
      - /etc/kubernetes/metrics-server.yml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: kubernetes_metrics_server_apply
  changed_when: >
    'created' in kubernetes_metrics_server_apply.stdout or
    'configured' in kubernetes_metrics_server_apply.stdout
