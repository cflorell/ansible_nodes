---
# No update_cache here: playbooks/lifecycle/pre_tasks.yml refreshes the
# package cache once upfront for the whole run (molecule's converge.yml does
# the same locally, since it doesn't import pre_tasks.yml).
- name: system setup | utilities | install utility packages
  tags: packages,system,settings
  ansible.builtin.package:
    name:
      - ca-certificates
      - colordiff
      - curl
      - dnsutils
      - gcc
      - git
      - htop
      - iotop
      - make
      - nano
      - ncdu
      - net-tools
      - "{{ nfs_package }}"
      - ripgrep
      - rsync
      - tmux
      - traceroute
      - wget
      - whois
