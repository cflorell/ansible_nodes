---
- name: users | root | create config directories
  ansible.builtin.file:
    path: /root/{{ item.dir }}
    state: directory
    owner: root
    group: root
    mode: "0700"
  with_items:
    - {dir: .vim}
    - {dir: .vim/colors}
  tags: dotfiles

- name: users | root | copy dotfiles
  ansible.builtin.copy:
    src: users/root/{{ item.src }}
    dest: /root/{{ item.dest }}
    owner: root
    group: root
    mode: "0600"
  with_items:
    - {src: bash/bashrc, dest: .bashrc}
    - {src: bash/bash_profile, dest: .bash_profile}
    - {src: bash/profile, dest: .profile}
    - {src: tmux/tmux.conf, dest: .tmux.conf}
  tags: dotfiles

# Authorizes the CI runner's dedicated key (generated in playbook.yml's "Pre
# tasks" play) so unattended CI runs can reach these hosts. Guarded so it's a
# no-op wherever the runner host isn't part of this inventory/run (e.g. the
# Vagrant test boxes) or wasn't included this time (e.g. a --limit run that
# skips it).
- name: users | root | authorize the CI runner's SSH key
  ansible.posix.authorized_key:
    user: root
    key: "{{ hostvars['runner'].runner_ssh_public_key }}"
    state: present
  when:
    - "'runner' in hostvars"
    - hostvars['runner'].runner_ssh_public_key is defined
    - inventory_hostname in (groups.get('server', []) + groups.get('nodes', []) + groups.get('kubernetes', []))
  tags: dotfiles
