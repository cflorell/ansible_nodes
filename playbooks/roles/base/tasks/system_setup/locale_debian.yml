---
- name: system setup | locale | Download and install custom locale
  become: true
  ansible.builtin.get_url:
    url: https://gist.githubusercontent.com/el-pato/49b094855a04aafbca3ebb875475cdf9/raw/3a58c03c50b02097285ac6f367547848436594f7/en_SE
    dest: /usr/share/i18n/locales/en_SE
    mode: '0644'

- name: system setup | locale | Generate locale
  become: true
  ansible.builtin.command: localedef -i en_SE -f UTF-8 en_SE.UTF-8
  args:
    creates: /usr/lib/locale/en_SE.UTF-8

- name: system setup | locale | Ensure localisation files for '{{ config_system_locale }}' are available
  community.general.locale_gen:
    name: '{{ config_system_locale }}'
    state: present

- name: system setup | locale | Ensure localisation files for '{{ config_system_language }}' are available
  community.general.locale_gen:
    name: '{{ config_system_language }}'
    state: present

- name: system setup | locale | Get current locale and language configuration
  tags: debug
  ansible.builtin.command: localectl status
  register: locale_status
  changed_when: false

- name: system setup | locale | Parse 'LANG' from current locale and language configuration
  ansible.builtin.set_fact:
    locale_lang: "{{ locale_status.stdout | regex_search('LANG=([^\n]+)', '\\1') | first }}"

- name: system setup | locale | Parse 'LANGUAGE' from current locale and language configuration
  tags: debug
  ansible.builtin.set_fact:
    locale_language: "{{ locale_status.stdout | regex_search('LANGUAGE=([^\n]+)', '\\1') | default([locale_lang], true) | first }}"

- name: system setup | locale | Configure locale to '{{ config_system_locale }}' and language to '{{ config_system_language }}'
  become: true
  ansible.builtin.command: localectl set-locale LANG={{ config_system_locale }} LANGUAGE={{ config_system_language }}
  changed_when: locale_lang != config_system_locale or locale_language != config_system_language
