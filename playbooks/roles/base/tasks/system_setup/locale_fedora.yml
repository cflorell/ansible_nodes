---
- name: system setup | fedora locale | install locale dependencies
  ansible.builtin.package:
    name:
      - glibc-locale-source
      - glibc-langpack-en

- name: system setup | fedora locale |  Download and install custom locale
  ansible.builtin.get_url:
    url: https://gist.githubusercontent.com/el-pato/49b094855a04aafbca3ebb875475cdf9/raw/3a58c03c50b02097285ac6f367547848436594f7/en_SE
    dest: /usr/share/i18n/locales/en_SE
    mode: '0644'

- name: system setup | fedora locale | List available locales
  ansible.builtin.command: locale -a
  register: locale_available
  changed_when: false
  check_mode: false

- name: system setup | fedora locale | Generate locale
  ansible.builtin.command: localedef -c -i {{ config_system_locale.split('.')[0] }} -f {{ config_system_locale.split('.')[-1] }} {{ config_system_locale }}
  register: output
  changed_when: output.rc in [0, 1]
  failed_when: output.rc not in [0, 1]
  when: "config_system_locale | lower | replace('-', '') not in (locale_available.stdout | lower | replace('-', ''))"

- name: system setup | fedora locale | Set locale
  ansible.builtin.command: localectl set-locale LANG={{ config_system_locale }}
  register: setlocale
  changed_when: setlocale.rc == 0
  when: config_system_locale | lower | replace('-', '') not in (locale_available.stdout | lower | replace('-', ''))
