---
- name: runner | assert supported OS
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] in ['Debian', 'Ubuntu']
    fail_msg: "The runner role currently supports Debian and Ubuntu hosts."

- name: runner | add GitLab Runner apt repository
  ansible.builtin.deb822_repository:
    name: gitlab-runner
    types: deb
    uris: "https://packages.gitlab.com/runner/gitlab-runner/{{ ansible_facts['distribution'] | lower }}"
    suites: "{{ ansible_facts['distribution_release'] | lower }}"
    components: main
    signed_by: "https://packages.gitlab.com/runner/gitlab-runner/gpgkey"
    state: present
    enabled: true

- name: runner | add HashiCorp apt repository
  ansible.builtin.deb822_repository:
    name: hashicorp
    types: deb
    uris: "https://apt.releases.hashicorp.com"
    suites: "{{ ansible_facts['distribution_release'] | lower }}"
    components: main
    signed_by: "https://apt.releases.hashicorp.com/gpg"
    state: present
    enabled: true

- name: runner | install GitLab Runner
  ansible.builtin.apt:
    name: gitlab-runner
    update_cache: true

- name: runner | install Vagrant and libvirt packages
  ansible.builtin.apt:
    name: "{{ gitlab_runner_vagrant_packages }}"
    update_cache: true

- name: runner | install CI tooling packages
  ansible.builtin.apt:
    name: "{{ gitlab_runner_ci_packages }}"
    update_cache: true

- name: runner | query latest sops release
  ansible.builtin.uri:
    url: https://api.github.com/repos/getsops/sops/releases/latest
    return_content: true
  register: sops_release
  retries: 3
  delay: 3
  until: sops_release is succeeded

- name: runner | download sops binary
  ansible.builtin.get_url:
    url: "https://github.com/getsops/sops/releases/download/{{ sops_release.json.tag_name }}/sops-{{ sops_release.json.tag_name }}.linux.amd64"
    dest: /usr/local/bin/sops
    mode: "0755"
  retries: 3
  delay: 3

- name: runner | add GitLab Runner user to Vagrant groups
  ansible.builtin.user:
    name: gitlab-runner
    append: true
    groups: "{{ gitlab_runner_groups }}"
  notify: restart gitlab-runner

- name: runner | enable libvirt daemon
  ansible.builtin.systemd:
    name: libvirtd
    enabled: true
    state: started

- name: runner | enable GitLab Runner service
  ansible.builtin.systemd:
    name: gitlab-runner
    enabled: true
    state: started

- name: runner | list registered GitLab runners
  ansible.builtin.command:
    argv:
      - gitlab-runner
      - list
  register: gitlab_runner_registered_runners
  changed_when: false
  failed_when: false

- name: runner | assert registration variables
  ansible.builtin.assert:
    that:
      - gitlab_runner_url | length > 0
      - gitlab_runner_token | length > 0
      - gitlab_runner_token != "glrt-change-me"
    fail_msg: "Set gitlab_runner_url and gitlab_runner_tokens[{{ inventory_hostname }}] in secrets.vault before registering the runner."

- name: runner | register shell runner
  ansible.builtin.command:
    argv:
      - gitlab-runner
      - register
      - --non-interactive
      - --url
      - "{{ gitlab_runner_url }}"
      - --token
      - "{{ gitlab_runner_token }}"
      - --executor
      - shell
      - --description
      - "{{ gitlab_runner_description }}"
  notify: restart gitlab-runner
  register: output
  changed_when: output.rc != 0

- name: runner | list installed Vagrant plugins
  become: true
  become_user: gitlab-runner
  ansible.builtin.command:
    argv:
      - vagrant
      - plugin
      - list
  environment:
    HOME: /home/gitlab-runner
  register: gitlab_runner_vagrant_plugin_list
  changed_when: false

- name: runner | install Vagrant plugins
  become: true
  become_user: gitlab-runner
  ansible.builtin.command:
    argv:
      - vagrant
      - plugin
      - install
      - "{{ item }}"
  environment:
    HOME: /home/gitlab-runner
    VAGRANT_DEFAULT_PROVIDER: libvirt
    VAGRANT_DISABLE_STRICT_DEPENDENCY_ENFORCEMENT: "1"
  loop: "{{ gitlab_runner_vagrant_plugins }}"
  when: item not in gitlab_runner_vagrant_plugin_list.stdout
  register: gitlab_runner_vagrant_plugin_install
  changed_when: "'Installed the plugin' in gitlab_runner_vagrant_plugin_install.stdout"

# molecule's platforms reference these boxes by name; without a locally
# registered box, `vagrant up` treats the name as a path and fails with
# "Couldn't open file .../<box>". Register whichever boxes vagrant_boxes has
# published to shared storage for the gitlab-runner user.
- name: runner | list registered Vagrant boxes
  become: true
  become_user: gitlab-runner
  ansible.builtin.command:
    argv:
      - vagrant
      - box
      - list
  environment:
    HOME: /home/gitlab-runner
  register: gitlab_runner_box_list
  changed_when: false

- name: runner | stat molecule base boxes in shared storage
  ansible.builtin.stat:
    path: "{{ gitlab_runner_box_storage_dir }}/{{ item.file }}"
  loop: "{{ gitlab_runner_vagrant_boxes }}"
  loop_control:
    label: "{{ item.name }}"
  register: gitlab_runner_box_files

- name: runner | register molecule base boxes for the gitlab-runner user
  become: true
  become_user: gitlab-runner
  ansible.builtin.command:
    argv:
      - vagrant
      - box
      - add
      - --name
      - "{{ item.item.name }}"
      - --provider
      - libvirt
      - --force
      - "{{ item.stat.path }}"
  environment:
    HOME: /home/gitlab-runner
  loop: "{{ gitlab_runner_box_files.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - item.stat.exists
    - item.item.name not in gitlab_runner_box_list.stdout
  changed_when: true

- name: runner | warn about unavailable molecule base boxes
  ansible.builtin.debug:
    msg: >-
      Vagrant box '{{ item.item.name }}' is neither registered for gitlab-runner
      nor present at {{ gitlab_runner_box_storage_dir }}/{{ item.item.file }}.
      The molecule CI job cannot boot it until vagrant_boxes publishes it there.
  loop: "{{ gitlab_runner_box_files.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - not item.stat.exists
    - item.item.name not in gitlab_runner_box_list.stdout
