---
- name: Ensure pve-enterprise.list is absent
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    state: absent

- name: Ensure ceph repo file is not present
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/ceph.list
    state: absent

- name: Add No Subscription Repository
  ansible.builtin.deb822_repository:
    name: pve-no-subscription
    types: [deb]
    uris: ["http://download.proxmox.com/debian/pve"]
    suites: ["{{ ansible_facts['distribution_release'] }}"]
    components: [pve-no-subscription]
    state: present

- name: Modify line in file to remove nag message
  ansible.builtin.replace:
    path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
    regexp: 'res[\s\n]*\.data\.status\.toLowerCase\(\) !== .active.'
    replace: false
    backup: true

- name: system setup | utilities | install utility packages
  ansible.builtin.package:
    name:
      - python3-proxmoxer
    update_cache: true
