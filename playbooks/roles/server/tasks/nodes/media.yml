---
- name: server | node-media | Create service directories
  ansible.builtin.file:
    path: "/{{ ansible_facts['user_id'] }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - jellyseerr
    - promtail
    - grimmory

- name: server | node-media | Move promtail-config.yml
  ansible.builtin.template:
    src: common/promtail-config.yml.j2
    dest: "/{{ ansible_facts['user_id'] }}/promtail/promtail-config.yml"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0600"

- name: server | node-media | move docker-compose.yml file to host
  ansible.builtin.template:
    src: "media/docker-compose.yml.j2"
    dest: "/{{ ansible_facts['user_id'] }}/docker-compose.yml"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0600"

- name: server | node-media | move .env file to host
  ansible.builtin.template:
    src: "media/env.j2"
    dest: "/{{ ansible_facts['user_id'] }}/.env"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0600"

- name: server | node-media | deploy Docker Compose stack
  block:
    - name: server | node-media | deploy Docker Compose stack
      community.docker.docker_compose_v2:
        project_src: "/{{ ansible_facts['user_id'] }}/"
        remove_orphans: true
        files:
          - docker-compose.yml
        recreate: always
  rescue:
    # Docker's DOCKER/nat iptables chains can go missing on this host between
    # deploys (LXC + host-level netfilter drift), which breaks port publishing
    # ("iptables: No chain/target/match by that name") for any service with
    # published ports (e.g. grimmory). Restarting Docker reprograms them.
    - name: server | node-media | Restart Docker to restore iptables NAT chains
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: server | node-media | Retry deploy Docker Compose stack
      community.docker.docker_compose_v2:
        project_src: "/{{ ansible_facts['user_id'] }}/"
        remove_orphans: true
        files:
          - docker-compose.yml
        recreate: always
