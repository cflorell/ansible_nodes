---
- name: server | node-immich | Create service directories
  ansible.builtin.file:
    path: "/{{ ansible_facts['user_id'] }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - model_cache
    - postgres

- name: server | node-immich | move docker-compose.yml file to host
  ansible.builtin.template:
    src: "immich/docker-compose.yml.j2"
    dest: "/{{ ansible_facts['user_id'] }}/docker-compose.yml"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0600"

- name: server | node-immich | move .env file to host
  ansible.builtin.template:
    src: "immich/env.j2"
    dest: "/{{ ansible_facts['user_id'] }}/.env"
    owner: "{{ ansible_facts['user_id'] }}"
    group: "{{ ansible_facts['user_id'] }}"
    mode: "0600"


- name: server | node-immich | deploy Docker Compose stack
  community.docker.docker_compose_v2:
    project_src: "/{{ ansible_facts['user_id'] }}/"
    remove_orphans: true
    files:
      - docker-compose.yml
    recreate: always
