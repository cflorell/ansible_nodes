stages:
  - secret-detection
  - lint
  - post-sast
  - fetch
  - test
  - check
  - apply

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/SAST-IaC.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'
  # workstation is deliberately excluded as ansible_connection=local is used,
  # so targeting it from CI would run tasks directly on the runner host itself.
  # Provisioning a workstation should not be handled by CI anyways...
  HOMELAB_ANSIBLE_CD_LIMIT: server,nodes,kubernetes

sast:
  stage: test

secret_detection:
  stage: secret-detection
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

trufflehog:
  stage: secret-detection
  image:
    name: trufflesecurity/trufflehog:latest
    entrypoint: [""]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - trufflehog git file://. --fail --json > trufflehog-report.json
  artifacts:
    when: always
    paths:
      - trufflehog-report.json
    expire_in: 1 week

.sast-analyzer:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

ansible_lint:
  stage: lint
  tags:
    - ansible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - python3 -m venv .venv-lint
    - .venv-lint/bin/pip install --quiet -r requirements-lint.txt
    - .venv-lint/bin/ansible-lint
  after_script:
    - rm -rf .venv-lint

parse-sast-results:
  stage: post-sast
  image: alpine:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache jq
  script:
    - echo "=== SECRET DETECTION RESULTS ==="
    - |
      if [ -f "gl-secret-detection-report.json" ]; then
        jq -r '.vulnerabilities[] |
          "Severity: [\(.severity)] | Category: \(.category) \n" +
          "Description: \(.message) \n" +
          "Location: \(.location.file):\(.location.start_line)\n" +
          "-----------------------------------"' gl-secret-detection-report.json
      else
        echo "gl-secret-detection-report.json not found."
      fi
    - echo "=== SAST RESULTS ==="
    - |
      if [ -f "gl-sast-report.json" ]; then
        jq -r '.vulnerabilities[] |
          "Severity: [\(.severity)] | Category: \(.category) \n" +
          "Description: \(.message) \n" +
          "Location: \(.location.file):\(.location.start_line)\n" +
          "-----------------------------------"' gl-sast-report.json
      else
        echo "gl-sast-report.json not found."
      fi

.molecule_rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: &molecule_changes
        - playbooks/roles/workstation/**
        - playbooks/roles/base/**
        - playbooks/pre_tasks/**
        - molecule/**
        - requirements.yml
        - requirements-test.txt
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *molecule_changes

# One job per (scenario, distro) pair — six in total. `--platform-name` scopes
# the whole test run to a single platform, so each job boots exactly one VM,
# and `resource_group: vagrant` serialises the jobs so only one VM is ever
# running on the runner. That stops the nested-virt host being starved by three
# parallel guests (which caused the SSH/become handshake timeouts), at the cost
# of a longer, sequential pipeline.
molecule:
  extends: .molecule_rules
  stage: test
  resource_group: vagrant
  interruptible: true
  variables:
    VAGRANT_DEFAULT_PROVIDER: libvirt
  tags:
    - ansible
  parallel:
    matrix:
      # base role is tested as part of the workstation scenario.
      - MOLECULE_SCENARIO: [workstation]
        MOLECULE_PLATFORM: [arch-test, fedora-test, ubuntu-test]
  before_script:
    - python3 -m venv .venv-molecule
    - .venv-molecule/bin/pip install --quiet -r requirements-test.txt
    - .venv-molecule/bin/ansible-galaxy collection install -r requirements.yml
  script:
    - ./scripts/molecule.sh test -s "$MOLECULE_SCENARIO" --platform-name "$MOLECULE_PLATFORM"
  after_script:
    - ./scripts/molecule.sh destroy -s "$MOLECULE_SCENARIO" || true
    - rm -rf .venv-molecule

.ansible_cd:
  tags:
    - ansible
  before_script:
    - git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/cf_homelab/secrets.git
    - ./scripts/link-private-files.sh --secrets-dir secrets
    - ansible-galaxy collection install -r requirements.yml

ansible_check:
  extends: .ansible_cd
  stage: check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == "main"
      allow_failure: true
  script:
    - ansible-playbook playbooks/playbook.yml --check --limit "$HOMELAB_ANSIBLE_CD_LIMIT"

ansible_apply:
  extends: .ansible_cd
  stage: apply
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  script:
    - ansible-playbook playbooks/playbook.yml --limit "$HOMELAB_ANSIBLE_CD_LIMIT"
  environment:
    name: homelab
