stages:
  - secret-detection
  - post-sast
  - lint
  - fetch
  - test
  - check
  - apply

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/SAST-IaC.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# Default to run on k8s runner instead of GitLab.com shared runners.
default:
  tags:
    - k8s

variables:
  SECRET_DETECTION_ENABLED: 'true'
  # workstation is deliberately excluded as ansible_connection=local is used,
  # so targeting it from CI would run tasks directly on the runner host itself.
  # Provisioning a workstation should not be handled by CI anyways...
  HOMELAB_ANSIBLE_CD_LIMIT: server,nodes,kubernetes

sast:
  stage: test

secret_detection:
  stage: secret-detection
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

trufflehog:
  stage: secret-detection
  image:
    name: trufflesecurity/trufflehog:latest
    entrypoint: [""]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - trufflehog git file://. --fail --json > trufflehog-report.json
  artifacts:
    when: always
    paths:
      - trufflehog-report.json
    expire_in: 1 week

.sast-analyzer:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

parse-sast-results:
  stage: post-sast
  image: alpine:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache jq
  script:
    - echo "=== SECRET DETECTION RESULTS ==="
    - |
      if [ -f "gl-secret-detection-report.json" ]; then
        jq -r '.vulnerabilities[] |
          "Severity: [\(.severity)] | Category: \(.category) \n" +
          "Description: \(.message) \n" +
          "Location: \(.location.file):\(.location.start_line)\n" +
          "-----------------------------------"' gl-secret-detection-report.json
      else
        echo "gl-secret-detection-report.json not found."
      fi
    - echo "=== SAST RESULTS ==="
    - |
      if [ -f "gl-sast-report.json" ]; then
        jq -r '.vulnerabilities[] |
          "Severity: [\(.severity)] | Category: \(.category) \n" +
          "Description: \(.message) \n" +
          "Location: \(.location.file):\(.location.start_line)\n" +
          "-----------------------------------"' gl-sast-report.json
      else
        echo "gl-sast-report.json not found."
      fi

ansible_lint:
  stage: lint
  image: python:3-slim
  variables:
    # The Kubernetes executor's build dir is world-writable (shared between
    # the helper container's git clone and the job's build container, which
    # may run as a different UID depending on the image), so Ansible refuses
    # to auto-load ansible.cfg from it - silently dropping roles_path along
    # with everything else in the file. Point at it explicitly instead: an
    # explicit path bypasses the cwd-auto-discovery safety check entirely.
    ANSIBLE_CONFIG: ${CI_PROJECT_DIR}/ansible.cfg
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - python3 -m venv .venv-lint
    - .venv-lint/bin/pip install --quiet -r requirements-lint.txt
    - .venv-lint/bin/ansible-lint
  after_script:
    - rm -rf .venv-lint

.molecule_rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: &molecule_changes
        - playbooks/roles/workstation/**
        - playbooks/roles/base/**
        - playbooks/pre_tasks/**
        - molecule/**
        - requirements.yml
        - requirements-test.txt
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *molecule_changes

molecule:
  extends: .molecule_rules
  stage: test
  interruptible: true
  variables:
    VAGRANT_DEFAULT_PROVIDER: libvirt
    MOLECULE_SCENARIO: workstation
  tags:
    - ansible
  before_script:
    - python3 -m venv .venv-molecule
    - .venv-molecule/bin/pip install --quiet -r requirements-test.txt
    - .venv-molecule/bin/ansible-galaxy collection install -r requirements.yml
  script:
    # scripts/molecule.sh exports ANSIBLE_LIBRARY for the vagrant driver, then
    # runs the venv's molecule (see the script header for the why).
    - ./scripts/molecule.sh test -s "$MOLECULE_SCENARIO"
  after_script:
    - ./scripts/molecule.sh destroy -s "$MOLECULE_SCENARIO" || true
    - rm -rf .venv-molecule

.ansible_cd:
  image: python:3-slim
  tags:
    - k8s
  variables:
    # The Kubernetes executor's build dir is world-writable, so Ansible
    # refuses to auto-load ansible.cfg from it - silently dropping not just
    # roles_path but inventory and vars_plugins_enabled (community.sops.sops)
    # too. Point at it explicitly instead: an explicit path bypasses the
    # cwd-auto-discovery safety check entirely, picking up the whole file
    # rather than needing every individual setting mirrored as its own
    # ANSIBLE_* env var.
    ANSIBLE_CONFIG: ${CI_PROJECT_DIR}/ansible.cfg
    # Cut CI log noise down to what changed (or failed) plus the final PLAY
    # RECAP summary, instead of a line per task per host regardless of result.
    ANSIBLE_DISPLAY_OK_HOSTS: "false"
    ANSIBLE_DISPLAY_SKIPPED_HOSTS: "false"
    # Job pods are ephemeral with no persistent known_hosts (unlike the shell
    # runner, which pre_tasks.yml populates once via ssh-keyscan). This is a
    # LAN-only homelab, so trust-on-first-use risk here is acceptable.
    ANSIBLE_HOST_KEY_CHECKING: "false"
    SOPS_VERSION: "v3.13.2"
  before_script:
    - apt-get update -qq && apt-get install -qq -y --no-install-recommends git openssh-client curl > /dev/null
    - curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" -o /usr/local/bin/sops
    - chmod 755 /usr/local/bin/sops
    - pip install --quiet ansible-core
    # KUBERNETES_RUNNER_SSH_PRIVATE_KEY: masked+protected CI/CD variable
    # holding the dedicated keypair pre_tasks.yml generates on kube-control
    # (authorized on every managed host by base/users/root.yml), base64-encoded
    - mkdir -p ~/.ssh
    - echo "$KUBERNETES_RUNNER_SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/cf_homelab/secrets.git
    - ./scripts/link-private-files.sh --secrets-dir secrets
    - ansible-galaxy collection install -r requirements.yml

ansible_check:
  extends: .ansible_cd
  stage: check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      allow_failure: true
    - if: $CI_COMMIT_BRANCH == "main"
      allow_failure: true
  script:
    # kubernetes-runner is skipped here: it manages the
    # gitlab-runner Helm release that CI itself depends on (the k8s tag runs
    # on it already; ansible_check/apply may too one day), so routine CD
    # should not redeploy it as an incidental side effect of the broad
    # kubernetes limit.
    # This is handled from local machine when updates are needed.
    - ansible-playbook playbooks/playbook.yml --check --limit "$HOMELAB_ANSIBLE_CD_LIMIT" --skip-tags kubernetes-runner

ansible_apply:
  extends: .ansible_cd
  stage: apply
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  script:
    - ansible-playbook playbooks/playbook.yml --limit "$HOMELAB_ANSIBLE_CD_LIMIT" --skip-tags kubernetes-runner
  environment:
    name: homelab
