stages:
  - secret-detection
  - lint
  - prepare
  - test
  - post-test

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/SAST-IaC.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'

sast:
  stage: test
  rules:
    - if: $FETCH_VAGRANT_BOXES == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

secret_detection:
  stage: secret-detection
  rules:
    - if: $FETCH_VAGRANT_BOXES == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

trufflehog:
  stage: secret-detection
  image:
    name: trufflesecurity/trufflehog:latest
    entrypoint: [""]
  rules:
    - if: $FETCH_VAGRANT_BOXES == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - trufflehog git file://. --fail --json > trufflehog-report.json
  artifacts:
    when: always
    paths:
      - trufflehog-report.json
    expire_in: 1 week

.sast-analyzer:
  rules:
    - if: $FETCH_VAGRANT_BOXES == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

ansible_lint:
  stage: lint
  tags:
    - ansible
  rules:
    - if: $FETCH_VAGRANT_BOXES == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - ansible-lint

fetch_vagrant_boxes:
  stage: prepare
  tags:
    - ansible
  rules:
    - if: $FETCH_VAGRANT_BOXES == "true" && $CI_PIPELINE_SOURCE == "web"
  variables:
    VAGRANT_BOXES_DIR: "/mnt/Storage3/boxes"
  script:
    - vagrant box add --name archlinux "${VAGRANT_BOXES_DIR}/archlinux.vagrant.box" --force
    - vagrant box add --name fedora "${VAGRANT_BOXES_DIR}/fedora44.vagrant.box" --force
    - vagrant box add --name ubuntu "${VAGRANT_BOXES_DIR}/ubuntu26.04.vagrant.box" --force

run_vagrant:
  stage: test
  variables:
    VAGRANT_DEFAULT_PROVIDER: libvirt
    ANSIBLE_VAULT_PASSWORD_FILE: .vault_pass
  tags:
    - ansible
  rules:
    - if: $FETCH_VAGRANT_BOXES == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - echo "$ANSIBLE_VAULT_PASSWORD" > .vault_pass
    - git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/cf_homelab/secrets.git
    - ./scripts/link-private-files.sh --secrets-dir secrets
  script:
    - ansible-lint
    - virsh destroy ansible_nodes_ubuntu-test || true
    - virsh undefine ansible_nodes_ubuntu-test --remove-all-storage || true
    - |
      for pool in $(virsh pool-list --all --name | grep ansible_nodes); do
        virsh pool-destroy "$pool" || true
        virsh pool-undefine "$pool" || true
      done
    - vagrant up
  after_script:
    - rm -f .vault_pass
    - vagrant destroy -f

parse-sast-results:
  stage: post-test
  image: alpine:latest
  rules:
    - if: $FETCH_VAGRANT_BOXES == "true"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache jq
  script:
    - echo "=== SECRET DETECTION RESULTS ==="
    - |
      if [ -f "gl-secret-detection-report.json" ]; then
        jq -r '.vulnerabilities[] |
          "Severity: [\(.severity)] | Category: \(.category) \n" +
          "Description: \(.message) \n" +
          "Location: \(.location.file):\(.location.start_line)\n" +
          "-----------------------------------"' gl-secret-detection-report.json
      else
        echo "gl-secret-detection-report.json not found."
      fi
    - echo "=== SAST RESULTS ==="
    - |
      if [ -f "gl-sast-report.json" ]; then
        jq -r '.vulnerabilities[] |
          "Severity: [\(.severity)] | Category: \(.category) \n" +
          "Description: \(.message) \n" +
          "Location: \(.location.file):\(.location.start_line)\n" +
          "-----------------------------------"' gl-sast-report.json
      else
        echo "gl-sast-report.json not found."
      fi
