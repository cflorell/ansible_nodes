[defaults]
# Roles live under playbooks/roles. The main playbook resolves them by
# adjacency, but out-of-tree playbooks (molecule/*/converge.yml) and
# ansible-lint's syntax-check need this on the search path too.
roles_path = playbooks/roles
action_warnings = True
deprecation_warnings = True
fact_caching = memory
fact_caching_timeout = 86400
inventory = ./inventory/hosts
no_log = False
vars_plugins_enabled = host_group_vars, community.sops.sops

[galaxy]
display_progress = True

[privilege_escalation]
become_method = sudo
become_user = root
